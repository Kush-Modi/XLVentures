# Configuration for the Enterprise Knowledge Layer Data Ingestion & Synthetic Generation Pipeline

loader:
  postings_chunk_size: 50000
  postings_max_rows: 100000
  resume_chunk_size: 100
  resume_max_rows: 1000

paths:
  raw_postings: "data/raw/postings.csv"
  raw_resumes: "data/raw/resume_dataset_1200.csv"
  processed_dir: "data/processed"
  synthetic_dir: "data/synthetic"
  logs_dir: "data/logs"
  reports_dir: "data/reports"

pipeline:
  validate_schemas: true
  generate_synthetic_interactions: true
  min_interactions_per_candidate: 2
  max_interactions_per_candidate: 5
